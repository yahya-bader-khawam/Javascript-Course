<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Page Project Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Project Gallery</h1>
        <p>Click on any image below to view it in the lightbox modal.</p>
    </header>

    <main>
        <section class="gallery-container">
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=800" alt="Modern Architecture Framing" class="lightbox-trigger">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=800" alt="Industrial Site Progress" class="lightbox-trigger">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1581094288338-2314dddb7ece?q=80&w=800" alt="Engineering Workspace Data" class="lightbox-trigger">
                </div>
            </div>
        </section>
    </main>

    <div id="lightboxModal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="modalImg" alt="Enlarged view">
        <div id="caption"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
